# Odin 3 HDR Brightness Fix configuration

# Disable SDR dimming when HDR content is on screen (recommended: 1)
DISABLE_SDR_DIMMING=1

# 3D adaptive tone mapping prop value (stock fix uses 0)
DISABLE_3D_ADAPTIVE_TM=0

# Disable hardware overlays (forces GPU composition).
# 1 = apply the SurfaceFlinger overlay disable (the original fix's behavior).
#     Fixes HDR paths that bypass tone mapping, but costs some battery/GPU.
# 0 = leave HW overlays enabled. Try this first - if HDR still looks right
#     with the XML + props alone, keep it at 0.
DISABLE_HW_OVERLAYS=1

# Watchdog: re-check every N seconds and re-apply if anything reset
# (SurfaceFlinger restarts silently undo the overlay setting).
# 0 = apply once at boot only.
WATCHDOG_INTERVAL=60
